<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- GITHUB CONFIG ---
    const REPO_URL = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/";
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Spawn Point: Inside the cabin
    camera.position.set(0, 1.6, 2); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const flashlight = new THREE.SpotLight(0xffffff, 60, 40, Math.PI / 6);
    scene.add(flashlight);
    scene.add(flashlight.target);

    const collidableObjects = [];
    const objLoader = new OBJLoader();
    const gltfLoader = new GLTFLoader();

    // 1. Load the Couch .obj
    objLoader.load(REPO_URL + 'couch.obj', (obj) => {
        obj.scale.set(0.05, 0.05, 0.05); // Adjust scale if couch is too big/small
        obj.position.set(3, 0, -3);      // Place it in the corner
        
        scene.add(obj);
        
        // Enable collisions for the couch
        obj.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
        console.log("Couch loaded");
    });

    // 2. Add the Interior Wall (Built-in shape)
    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(10, 5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x3d2b1f })
    );
    wall.position.set(-5, 2.5, -5);
    scene.add(wall);
    collidableObjects.push(wall);

    // 3. Load the Cabin .glb
    gltfLoader.load(REPO_URL + 'cabin.glb', (glb) => {
        glb.scene.scale.set(10, 10, 10);
        scene.add(glb.scene);
        glb.scene.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
    });

    // --- Controls & Movement ---
    const controls = new PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    const keys = { w:false, a:false, s:false, d:false };
    document.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    document.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    const raycaster = new THREE.Raycaster();

    function animate() {
        requestAnimationFrame(animate);
        if (controls.isLocked) {
            flashlight.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            flashlight.target.position.copy(camera.position).add(dir);

            // Collision Check
            let canMove = true;
            raycaster.set(camera.position, dir);
            const hits = raycaster.intersectObjects(collidableObjects);
            if (hits.length > 0 && hits[0].distance < 1.2) canMove = false;

            if (keys.w && canMove) controls.moveForward(0.07);
            if (keys.s) controls.moveForward(-0.07);
            if (keys.a) controls.moveRight(-0.07);
            if (keys.d) controls.moveRight(0.07);
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
