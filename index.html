<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin in the Woods</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <script>
        // --- ASSET PATHS ---
        const REPO_URL = "./";
        
        const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Spawn Point: Behind the cabin so it is visible initially
    camera.position.set(0, 2.5, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));
    scene.add(new THREE.AmbientLight(0xffffff, 0.25));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const cabinLight = new THREE.PointLight(0xffccaa, 0.7, 20, 2);
    cabinLight.position.set(0, 3, 0);
    scene.add(cabinLight);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshStandardMaterial({ color: 0x2b3a15, roughness: 0.95 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    const collidableObjects = [];
    const treeInstances = [];
    const TREE_COUNT = 140;
    const TREE_MIN_RADIUS = 18;
    const TREE_MAX_RADIUS = 120;
    const objLoader = new THREE.OBJLoader();
    const gltfLoader = new THREE.GLTFLoader();

    // 1. Load the Couch .obj
    objLoader.load(REPO_URL + 'couch.obj', (obj) => {
        obj.scale.set(0.05, 0.05, 0.05); // Adjust scale if couch is too big/small
        obj.position.set(3, 0, -3);      // Place it in the corner
        
        scene.add(obj);
        
        // Enable collisions for the couch
        obj.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
        console.log("Couch loaded");
    }, undefined, (error) => {
        console.error('Error loading couch:', error);
    });

    // 2. Load the Tree .obj and place the forest around the cabin
    objLoader.load(REPO_URL + 'tree.obj', (treeObj) => {
        treeObj.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                if (child.material) {
                    child.material = child.material.clone();
                    child.material.color = new THREE.Color(0x2f7d2a);
                }
            }
        });
        treeObj.scale.set(0.5, 0.5, 0.5);

        const createTree = () => {
            const tree = treeObj.clone(true);
            tree.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material = child.material.clone();
                    child.material.color = new THREE.Color(0x2f7d2a);
                }
            });
            const angle = Math.random() * Math.PI * 2;
            const radius = THREE.MathUtils.lerp(TREE_MIN_RADIUS, TREE_MAX_RADIUS, Math.random());
            tree.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
            treeInstances.push(tree);
            tree.traverse(child => {
                if (child.isMesh) collidableObjects.push(child);
            });
        };

        for (let i = 0; i < TREE_COUNT; i++) {
            createTree();
        }
        console.log('Forest loaded with ' + treeInstances.length + ' trees');
    }, undefined, (error) => {
        console.error('Error loading tree:', error);
    });

    // 3. Load the Cabin .glb
    gltfLoader.load(REPO_URL + 'Cabin.glb', (glb) => {
        glb.scene.scale.set(10, 10, 10);
        const bbox = new THREE.Box3().setFromObject(glb.scene);
        glb.scene.position.set(0, -bbox.min.y, 0);
        scene.add(glb.scene);
        glb.scene.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
    }, undefined, (error) => {
        console.error('Error loading cabin:', error);
    });

    // --- Controls & Movement ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    const keys = { w:false, a:false, s:false, d:false };
    document.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    document.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    const raycaster = new THREE.Raycaster();

    function animate() {
        requestAnimationFrame(animate);
        if (controls.isLocked) {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

            treeInstances.forEach(tree => {
                const dx = tree.position.x - camera.position.x;
                const dz = tree.position.z - camera.position.z;
                const distSq = dx * dx + dz * dz;
                if (distSq > TREE_MAX_RADIUS * TREE_MAX_RADIUS) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = THREE.MathUtils.lerp(TREE_MIN_RADIUS, TREE_MAX_RADIUS, Math.random());
                    tree.position.set(camera.position.x + Math.cos(angle) * radius, 0, camera.position.z + Math.sin(angle) * radius);
                }
            });

            // Collision Check
            let canMove = true;
            raycaster.set(camera.position, dir);
            const hits = raycaster.intersectObjects(collidableObjects);
            if (hits.length > 0 && hits[0].distance < 1.2) canMove = false;

            if (keys.w && canMove) controls.moveForward(0.07);
            if (keys.s) controls.moveForward(-0.07);
            if (keys.a) controls.moveRight(-0.07);
            if (keys.d) controls.moveRight(0.07);
        }
        renderer.render(scene, camera);
    }
    animate();
    </script>
</body>
</html>
