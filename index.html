<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulder in the Forest</title>

    <!-- Three.js + extras -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ccc; z-index: 10; }
        #story { color: #d44; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="story">BOULDER IN THE FOREST<br>Destroy as many trees as possible!</div>
    <div>Score: <span id="score">0</span></div>
    <div>Click to lock pointer | Mouse: Move (X for direction, Y for speed)</div>
</div>

<script>
const REPO_URL = "./";

/* -------------------------------------------------------
   BASIC THREE.JS SETUP
------------------------------------------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -------------------------------------------------------
   LOADERS
------------------------------------------------------- */
const objLoader = new THREE.OBJLoader();
const gltfLoader = new THREE.GLTFLoader();

/* -------------------------------------------------------
   GLOBALS
------------------------------------------------------- */
let shrubObj = null;
let treeObj1 = null;
let treeObj2 = null;
let forestSpawned = false;

let boulder = null;
let dog = null;
let score = 0;
let barrels = [];
let particles = [];

const collidableObjects = [];
const treeInstances = [];

const TREE_COUNT = 120;
const TREE_MIN_RADIUS = 35;
const TREE_MAX_RADIUS = 80;

let boulderVelocity = new THREE.Vector3(0, 0, 0);
let mouseX = 0;
let mouseY = 0;

const clock = new THREE.Clock();

/* -------------------------------------------------------
   LIGHTING
------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
scene.add(sun);

/* -------------------------------------------------------
   FLOOR
------------------------------------------------------- */
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(1000, 1000),
    new THREE.MeshStandardMaterial({ color: 0x2b3a15, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

/* -------------------------------------------------------
   BARRELS
------------------------------------------------------- */
for (let i = 0; i < 10; i++) {
    const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, 1, 8),
        new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 })
    );
    barrel.position.set(
        (Math.random() - 0.5) * 100,
        0.5,
        (Math.random() - 0.5) * 100
    );
    scene.add(barrel);
    barrels.push(barrel);
    collidableObjects.push(barrel);
}

/* -------------------------------------------------------
   TERRAIN (hills)
------------------------------------------------------- */
for (let i = 0; i < 20; i++) {
    const hill = new THREE.Mesh(
        new THREE.SphereGeometry(Math.random() * 5 + 2, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x2b3a15, roughness: 1 })
    );
    hill.position.set(
        (Math.random() - 0.5) * 200,
        -Math.random() * 2,
        (Math.random() - 0.5) * 200
    );
    hill.scale.y = 0.5;
    scene.add(hill);
    collidableObjects.push(hill);
}

/* -------------------------------------------------------
   GRASS (grass.obj)
------------------------------------------------------- */
objLoader.load(REPO_URL + "grass.obj", (obj) => {
    const grassObj = obj;

    grassObj.traverse(child => {
        if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
                color: 0x2b3a15,
                roughness: 1
            });
        }
    });

    grassObj.scale.set(10, 1, 10);

    for (let x = -150; x <= 150; x += 30) {
        for (let z = -150; z <= 150; z += 30) {
            const patch = grassObj.clone(true);
            patch.position.set(x, 0, z);
            scene.add(patch);
        }
    }
});

/* -------------------------------------------------------
   SHRUB WALL
------------------------------------------------------- */
objLoader.load(REPO_URL + "shrub.obj", (obj) => {
    shrubObj = obj;
    shrubObj.traverse(child => {
        if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
                color: 0x1a2a0a
            });
        }
    });
});

/* -------------------------------------------------------
   TREE HELPERS
------------------------------------------------------- */
function setupTree(tree) {
    tree.traverse(child => {
        if (child.isMesh) {
            child.geometry.computeVertexNormals();

            const pos = child.geometry.attributes.position;
            const colors = [];

            const bbox = new THREE.Box3().setFromBufferAttribute(pos);
            const minY = bbox.min.y;
            const maxY = bbox.max.y;
            const height = maxY - minY;

            for (let i = 0; i < pos.count; i++) {
                const y = pos.getY(i);
                const t = (y - minY) / height;

                if (t < 0.25) {
                    colors.push(0.4, 0.25, 0.1); // brown trunk
                } else {
                    colors.push(0.2, 0.6, 0.2); // green leaves
                }
            }

            child.geometry.setAttribute(
                "color",
                new THREE.Float32BufferAttribute(colors, 3)
            );

            child.material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.9
            });
        }
    });

    tree.scale.set(0.5, 0.5, 0.5);
    return tree;
}

function trySpawnForest() {
    if (forestSpawned || (!treeObj1 && !treeObj2)) return;
    forestSpawned = true;

    for (let i = 0; i < TREE_COUNT; i++) {
        const template = (treeObj1 && treeObj2)
            ? (Math.random() > 0.5 ? treeObj1 : treeObj2)
            : (treeObj1 || treeObj2);

        const tree = template.clone(true);

        const angle = Math.random() * Math.PI * 2;
        const radius = THREE.MathUtils.lerp(TREE_MIN_RADIUS, TREE_MAX_RADIUS, Math.random());

        tree.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        tree.rotation.y = Math.random() * Math.PI * 2;

        scene.add(tree);
        treeInstances.push(tree);

        tree.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
    }
}

/* -------------------------------------------------------
   LOAD TREES
------------------------------------------------------- */
objLoader.load(REPO_URL + "tree.obj", (obj) => {
    treeObj1 = setupTree(obj);
    trySpawnForest();
});

objLoader.load(REPO_URL + "tree2.obj", (obj) => {
    treeObj2 = setupTree(obj);
    trySpawnForest();
});

/* -------------------------------------------------------
   BOULDER (placeholder sphere)
------------------------------------------------------- */
boulder = new THREE.Mesh(
    new THREE.SphereGeometry(1, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 })
);
boulder.scale.set(1.2, 0.8, 1.0); // make it boulder-shaped
boulder.position.set(0, 1, 0);
scene.add(boulder);

/* -------------------------------------------------------
   DOG (dog.glb)
------------------------------------------------------- */
gltfLoader.load(REPO_URL + "dog.glb", (glb) => {
    dog = glb.scene;

    dog.traverse(child => {
        if (child.isMesh) {
            child.geometry.computeVertexNormals();

            child.material = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.8
            });
        }
    });

    dog.scale.set(10, 10, 10);
    dog.position.set(2, 2, 2);

    scene.add(dog);
});

/* -------------------------------------------------------
   CONTROLS + MOVEMENT
------------------------------------------------------- */
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());

let directionAngle = 0;
let acceleration = 0;

document.addEventListener("mousemove", (e) => {
    if (controls.isLocked) {
        directionAngle += e.movementX * 0.01;
        acceleration += e.movementY * -0.001; // negative for up=forward
        acceleration = Math.max(-0.1, Math.min(0.1, acceleration)); // clamp
    }
});

const raycaster = new THREE.Raycaster();

function handleMovement() {
    if (!boulder) return;

    // Mouse controls direction and acceleration
    const direction = new THREE.Vector3(Math.sin(directionAngle), 0, Math.cos(directionAngle));
    boulderVelocity.add(direction.multiplyScalar(acceleration));

    // Friction
    boulderVelocity.multiplyScalar(0.98);

    // Apply velocity
    boulder.position.add(boulderVelocity);

    // Rolling rotation
    boulder.rotation.x += boulderVelocity.z * 0.1;
    boulder.rotation.z += boulderVelocity.x * 0.1;

    // Update camera position (third-person)
    const offset = new THREE.Vector3(
        Math.sin(directionAngle) * cameraDistance,
        cameraHeight,
        Math.cos(directionAngle) * cameraDistance
    );
    camera.position.copy(boulder.position).add(offset);
    camera.lookAt(boulder.position);
}

function updateParticles() {
    particles.forEach((p, index) => {
        p.position.add(p.velocity);
        p.velocity.y -= 0.005; // gravity
        if (p.position.y < 0) {
            scene.remove(p);
            particles.splice(index, 1);
        }
    });
}

function handleMovement() {
    if (!boulder) return;

    targetPos.y = 0; // keep on ground
    dog.position.lerp(targetPos, 0.05);

    if (keys.s) boulder.position.z += speed;
    if (keys.a) boulder.position.x -= speed;
    if (keys.d) boulder.position.x += speed;

    // Rotate boulder based on movement
    if (keys.w) boulder.rotation.z += 0.1;
    if (keys.s) boulder.rotation.z -= 0.1;
    if (keys.a) createParticles(tree.position);

                treeInstances.splice(index, 1);
                score++;
                document.getElementById('score').textContent = score;
            }
        });
        barrels.forEach((barrel, index) => {
            if (barrel && boulder.position.distanceTo(barrel.position) < 2) {
                createParticles(barrel.position);
                scene.remove(barrel);
                barrels.splice(index, 1);
                collidableObjects.splice(collidableObjects.indexOf(barrel), 1);
                score++;
                document.getElementById('score').textContent = score;
            }
        });
    }

    updateParticles();   cameraHeight,
        Math.cos(cameraAngle) * cameraDistance
    );
    camera.position.copy(boulder.position).add(offset);
    camera.lookAt(boulder.position);
}

/* -------------------------------------------------------
   ANIMATION LOOP
------------------------------------------------------- */
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    handleMovement();

    // Dog follows boulder
    if (dog && boulder) {
        const direction = boulder.position.clone().sub(dog.position).normalize();
        dog.position.add(direction.multiplyScalar(0.05));
        dog.lookAt(boulder.position);
    }

    // Check for tree destruction
    if (boulder) {
        treeInstances.forEach((tree, index) => {
            if (tree & boulder.position.distanceTo(tree.position) < 2) {
                scene.remove(tree);
                treeInstances.splice(index, 1);
                score++;
                document.getElementById('score').textContent = score;
            }
        });
    }

    renderer.render(scene, camera);
}

animate();

/* -------------------------------------------------------
   RESIZE
------------------------------------------------------- */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
