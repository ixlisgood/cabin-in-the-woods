<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabin in the Woods</title>

    <!-- Three.js + extras -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ccc; z-index: 10; }
        #story { color: #d44; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="story">CABIN IN THE WOODS<br>You wake up in an old cabin... something feels wrong.</div>
    <div>WASD: Move | Mouse: Look | Click to start</div>
</div>

<script>
const REPO_URL = "./";

/* -------------------------------------------------------
   BASIC THREE.JS SETUP
------------------------------------------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* -------------------------------------------------------
   LOADERS
------------------------------------------------------- */
const objLoader = new THREE.OBJLoader();
const gltfLoader = new THREE.GLTFLoader();

/* -------------------------------------------------------
   GLOBALS
------------------------------------------------------- */
let shrubObj = null;
let treeObj1 = null;
let treeObj2 = null;
let forestSpawned = false;

let enemy = null;
let enemySpeed = 0.03;

const collidableObjects = [];
const treeInstances = [];

const TREE_COUNT = 120;
const TREE_MIN_RADIUS = 35;
const TREE_MAX_RADIUS = 80;

/* -------------------------------------------------------
   LIGHTING
------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 5);
scene.add(sun);

const cabinLight = new THREE.PointLight(0xffccaa, 0.7, 20, 2);
cabinLight.position.set(0, 3, 0);
scene.add(cabinLight);

/* -------------------------------------------------------
   FLOOR
------------------------------------------------------- */
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(1000, 1000),
    new THREE.MeshStandardMaterial({ color: 0x2b3a15, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

/* -------------------------------------------------------
   GRASS (grass.obj)
------------------------------------------------------- */
objLoader.load(REPO_URL + "grass.obj", (obj) => {
    const grassObj = obj;

    grassObj.traverse(child => {
        if (child.isMesh) {
            if (child.material && child.material.clone) {
                child.material = child.material.clone();
            }
            child.material.color = new THREE.Color(0x2b3a15);
        }
    });

    grassObj.scale.set(10, 1, 10);

    for (let x = -150; x <= 150; x += 30) {
        for (let z = -150; z <= 150; z += 30) {
            const patch = grassObj.clone(true);
            patch.position.set(x, 0, z);
            scene.add(patch);
        }
    }
});

/* -------------------------------------------------------
   SHRUB WALL
------------------------------------------------------- */
objLoader.load(REPO_URL + "shrub.obj", (obj) => {
    shrubObj = obj;
    shrubObj.traverse(child => {
        if (child.isMesh && child.material) {
            child.material = child.material.clone();
            child.material.color = new THREE.Color(0x1a2a0a);
        }
    });
});

/* -------------------------------------------------------
   COUCH
------------------------------------------------------- */
objLoader.load(REPO_URL + "couch.obj", (obj) => {
    obj.scale.set(0.2, 0.2, 0.2);
    obj.position.set(3, 0, -3);
    scene.add(obj);

    obj.traverse(child => {
        if (child.isMesh) collidableObjects.push(child);
    });
});

/* -------------------------------------------------------
   TREE HELPERS
------------------------------------------------------- */
function setupTree(tree) {
    tree.traverse(child => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material && child.material.clone) {
                child.material = child.material.clone();
                child.material.color = new THREE.Color(0x2f7d2a);
            }
        }
    });
    tree.scale.set(0.5, 0.5, 0.5);
    return tree;
}

function trySpawnForest() {
    if (forestSpawned || (!treeObj1 && !treeObj2)) return;
    forestSpawned = true;

    for (let i = 0; i < TREE_COUNT; i++) {
        const template = (treeObj1 && treeObj2)
            ? (Math.random() > 0.5 ? treeObj1 : treeObj2)
            : (treeObj1 || treeObj2);

        const tree = template.clone(true);

        const angle = Math.random() * Math.PI * 2;
        const radius = THREE.MathUtils.lerp(TREE_MIN_RADIUS, TREE_MAX_RADIUS, Math.random());

        tree.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        tree.rotation.y = Math.random() * Math.PI * 2;

        scene.add(tree);
        treeInstances.push(tree);

        tree.traverse(child => {
            if (child.isMesh) collidableObjects.push(child);
        });
    }
}

/* -------------------------------------------------------
   LOAD TREES
------------------------------------------------------- */
objLoader.load(REPO_URL + "tree.obj", (obj) => {
    treeObj1 = setupTree(obj);
    trySpawnForest();
});

objLoader.load(REPO_URL + "tree2.obj", (obj) => {
    treeObj2 = setupTree(obj);
    trySpawnForest();
});

/* -------------------------------------------------------
   CABIN
------------------------------------------------------- */
gltfLoader.load(REPO_URL + "Cabin.glb", (glb) => {
    glb.scene.scale.set(13, 13, 13);
    const bbox = new THREE.Box3().setFromObject(glb.scene);
    glb.scene.position.set(0, -bbox.min.y, 0);
    scene.add(glb.scene);

    glb.scene.traverse(child => {
        if (child.isMesh) collidableObjects.push(child);
    });
});

/* -------------------------------------------------------
   ENEMY (enemy.obj)
------------------------------------------------------- */
objLoader.load(REPO_URL + "enemy.obj", (obj) => {
    enemy = obj;

    enemy.traverse(child => {
        if (child.isMesh) {
            if (child.material && child.material.clone) {
                child.material = child.material.clone();
            }
            child.material.color = new THREE.Color(0x880000);
            collidableObjects.push(child);
        }
    });

    enemy.scale.set(1.5, 1.5, 1.5);
    enemy.position.set(0, 0, -60);

    scene.add(enemy);
});

/* -------------------------------------------------------
   CONTROLS
------------------------------------------------------- */
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());

const keys = { w:false, a:false, s:false, d:false };
document.addEventListener("keydown", e => { if (keys[e.key] !== undefined) keys[e.key] = true; });
document.addEventListener("keyup", e => { if (keys[e.key] !== undefined) keys[e.key] = false; });

const raycaster = new THREE.Raycaster();

/* -------------------------------------------------------
   ANIMATION LOOP
------------------------------------------------------- */
function animate() {
    requestAnimationFrame(animate);

    /* Enemy AI */
    if (enemy) {
        const playerPos = camera.position.clone();
        const enemyPos = enemy.position.clone();

        const direction = playerPos.sub(enemyPos).normalize();
        enemy.position.add(direction.multiplyScalar(enemySpeed));

        enemy.lookAt(camera.position);

        if (enemy.position.distanceTo(camera.position) < 2) {
            console.log("The monster caught you");
        }
    }

    /* Player movement */
    if (controls.isLocked) {
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

        raycaster.set(camera.position, dir);
        const hits = raycaster.intersectObjects(collidableObjects, true);
        const canMove = !(hits.length > 0 && hits[0].distance < 1.2);

        const speed = 0.07;
        if (keys.w && canMove) controls.moveForward(speed);
        if (keys.s) controls.moveForward(-speed);
        if (keys.a) controls.moveRight(-speed);
        if (keys.d) controls.moveRight(speed);
    }

    renderer.render(scene, camera);
}

animate();

/* -------------------------------------------------------
   RESIZE
------------------------------------------------------- */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
